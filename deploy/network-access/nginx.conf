map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

proxy_http_version 1.1;
proxy_set_header Host $http_host;
proxy_set_header X-Forwarded-Host $http_host;
proxy_set_header X-Forwarded-Port $server_port;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Upgrade $http_upgrade;
proxy_set_header Connection $connection_upgrade;
client_max_body_size 200M;

allow 127.0.0.1;
allow 10.0.0.0/8;
allow 172.16.0.0/12;
allow 192.168.0.0/16;
deny all;

server {
    listen 8117;
    location / {
        proxy_pass http://wmc-marketing-agent:8080;
    }
}

server {
    listen 5678;
    location / {
        proxy_pass http://host.docker.internal:5678;
    }
}

server {
    listen 4007;
    location / {
        proxy_pass http://wmc-postiz:5000;
    }
}

server {
    listen 4019;
    location / {
        proxy_pass http://wmc-twenty-server:3000;
    }
}

server {
    listen 4020;
    location / {
        proxy_pass http://wmc-mautic-web:80;
    }
}

server {
    listen 8188;
    location / {
        proxy_pass http://host.docker.internal:8188;
    }
}

server {
    listen 3030;
    location / {
        proxy_pass http://host.docker.internal:3030;
    }
}
